<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vehículo — Autosucro</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
<div id="header-container"></div>

<div id="vehiclePage"></div>

<div id="footer-container"></div>
<script src="js/vehicles-data.js"></script>
<script src="js/components.js"></script>
<script>
  document.getElementById('header-container').innerHTML = renderHeader('Vehículos');
  document.getElementById('footer-container').innerHTML = renderFooter();
  initMobileNav();

  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id'));
  const v = getVehicles().find(v => v.id === id);

  if (!v) {
    document.getElementById('vehiclePage').innerHTML = `
      <div style="min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:80px 24px;text-align:center">
        <p style="font-size:18px;font-weight:700;color:var(--brand)">Vehículo no encontrado</p>
        <a href="vehiculos.html" class="btn btn-dark">Ver todos los vehículos</a>
      </div>`;
  } else {
    document.title = `${v.brand} ${v.model} ${v.year} — Autosucro`;

    const imgs = (v.images && v.images.length > 0) ? v.images : (v.image ? [v.image] : []);
    const mainSrc = imgs[0] || '';

    const imgEl = mainSrc
      ? `<img id="vpMainImg" src="${mainSrc}" alt="${v.brand} ${v.model}">`
      : `<div class="vp-img-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="width:64px;height:64px;opacity:0.2"><path d="M5 17H3a2 2 0 01-2-2V9a2 2 0 012-2h1.5M19 17h2a2 2 0 002-2V9a2 2 0 00-2-2h-1.5M7 9l2-5h6l2 5M3 9h18M7 17v2M17 17v2"/></svg></div>`;

    const thumbsEl = imgs.length > 1
      ? `<div class="vp-thumbs">${imgs.map((src, i) =>
          `<img class="vp-thumb${i === 0 ? ' active' : ''}" src="${src}" loading="lazy" onclick="vpSwitch('${src}',this)" alt="${v.brand} ${v.model} foto ${i+1}">`
        ).join('')}</div>`
      : '';

    const specs = [
      { label: 'Año',         val: v.year },
      { label: 'Kilómetros',  val: formatKm(v.km) },
      { label: 'Combustible', val: v.fuel },
      { label: 'Cambio',      val: v.transmission },
      { label: 'Motor',       val: v.engine || '—' },
      { label: 'Puertas',     val: v.doors },
      { label: 'Tracción',    val: v.traction || '—' },
      { label: 'Tipo',        val: v.condition || '—' },
    ];

    const waText = encodeURIComponent(`Hola, me interesa el ${v.brand} ${v.model} ${v.year} (${formatPrice(v.price)}). ¿Sigue disponible?`);

    document.getElementById('vehiclePage').innerHTML = `
      <!-- HERO IMAGE -->
      <div class="vp-hero">
        <div class="vp-img">${imgEl}</div>
        <div class="vp-hero-bar">
          <a href="vehiculos.html" class="vp-back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Volver al catálogo
          </a>
          <span class="v-badge v-badge-${v.sold ? 'off' : 'on'}" style="position:static">${v.sold ? 'Vendido' : 'Disponible'}</span>
        </div>
      </div>
      ${thumbsEl}

      <!-- CONTENT -->
      <div class="vp-content">
        <div class="vp-grid">

          <!-- LEFT: info -->
          <div class="vp-info">
            <p class="vp-brand">${v.brand}</p>
            <h1 class="vp-model">${v.model}</h1>
            <p class="vp-meta">${v.year} · ${formatKm(v.km)} · ${v.fuel} · ${v.transmission}</p>

            ${v.highlight ? `
            <div class="vp-guarantee">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              ${v.highlight}
            </div>` : ''}

            <div class="vp-specs-grid">
              ${specs.map(s => `
              <div class="vp-spec">
                <p class="vp-spec-label">${s.label}</p>
                <p class="vp-spec-val">${s.val}</p>
              </div>`).join('')}
            </div>
          </div>

          <!-- RIGHT: price + CTAs -->
          <div class="vp-sidebar">
            <div class="vp-price-card">
              <p class="vp-price-label">Precio</p>
              <p class="vp-price">${formatPrice(v.price)}</p>
              <p class="vp-price-note">IVA ${v.iva || 'Incluido'}</p>

              ${v.sold ? `
              <div class="vp-sold-notice">Este vehículo ya ha sido vendido</div>
              <a href="vehiculos.html" class="btn btn-dark" style="width:100%;justify-content:center;margin-top:4px">Ver otros vehículos</a>
              ` : `
              <a href="https://wa.me/34646642082?text=${waText}" target="_blank" class="btn btn-dark vp-cta">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                Preguntar por WhatsApp
              </a>
              <a href="tel:961730361" class="btn btn-dark-outline vp-cta">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 11 19.79 19.79 0 01.22 2.35 2 2 0 012.22.18h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 8a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 14.92v2z"/></svg>
                Llamar: 961 730 361
              </a>
              <a href="contacto.html" class="btn btn-ghost vp-cta" style="justify-content:center">Reservar cita para verlo</a>
              `}
            </div>

            <div class="vp-dealer-card">
              <p class="vp-dealer-title">Autosucro · Cullera</p>
              <p class="vp-dealer-info">Carrer Sueca, 32 — 46400 Cullera, Valencia</p>
              <p class="vp-dealer-info">Lun–Vie 9:00–14:00 / 16:00–19:30 · Sáb 9:00–13:30</p>
            </div>
          </div>

        </div>
      </div>`;
  }

  function vpSwitch(src, el) {
    const main = document.getElementById('vpMainImg');
    if (main) main.src = src;
    document.querySelectorAll('.vp-thumb').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }
</script>
<style>
.vp-thumbs {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 12px 24px;
  background: var(--bg-2, #f5f5f5);
  border-bottom: 1px solid var(--border, #e5e5e5);
  scrollbar-width: thin;
}
.vp-thumb {
  width: 90px;
  height: 66px;
  object-fit: cover;
  border-radius: 5px;
  cursor: pointer;
  flex-shrink: 0;
  opacity: 0.55;
  transition: opacity .18s, outline .18s;
}
.vp-thumb:hover { opacity: 0.85; }
.vp-thumb.active {
  opacity: 1;
  outline: 2px solid var(--brand, #d00);
  outline-offset: 2px;
}
</style>
<script src="js/animations.js"></script>
</body>
</html>
