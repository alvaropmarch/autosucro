<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin — Autosucro</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <img src="../Recursos/autosucro_blanco.png" alt="Autosucro" style="height:48px;filter:invert(1) brightness(0)">
    </div>
    <h1 class="login-title" style="margin-top:28px">Panel de administración</h1>
    <p class="login-sub">Introduce la contraseña para acceder</p>
    <div class="login-err" id="loginError">Contraseña incorrecta</div>
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group" style="margin-bottom:14px">
        <input type="password" class="form-input" id="passwordInput" placeholder="Contraseña" required autofocus style="border-radius:var(--r-xl)">
      </div>
      <button type="submit" class="btn btn-dark" style="width:100%;justify-content:center">Entrar</button>
    </form>
  </div>
</div>

<!-- PANEL -->
<div id="adminPanel" style="display:none">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-logo">
        <img src="../Recursos/autosucro_blanco.png" alt="Autosucro">
      </div>
      <nav class="admin-nav">
        <a href="#" id="navDashboard" class="active" onclick="showSection('dashboard')">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="#" id="navVehicles" onclick="showSection('vehicles')">
          <svg viewBox="0 0 24 24"><path d="M5 17H3a2 2 0 01-2-2V9a2 2 0 012-2h1.5M19 17h2a2 2 0 002-2V9a2 2 0 00-2-2h-1.5M7 9l2-5h6l2 5M3 9h18M7 17v2M17 17v2"/></svg>
          Vehículos
        </a>
        <a href="#" id="navAdd" onclick="showSection('add')">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Añadir vehículo
        </a>
        <hr style="border:none;border-top:1px solid rgba(255,255,255,0.08);margin:14px 0">
        <a href="../index.html" target="_blank">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
          Ver web
        </a>
        <a href="#" onclick="handleLogout()">
          <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Cerrar sesión
        </a>
      </nav>
    </aside>

    <main class="admin-main">

      <!-- DASHBOARD -->
      <div id="sectionDashboard">
        <div class="admin-header">
          <h1 class="admin-title">Dashboard</h1>
          <span id="adminDate" style="font-size:13px;color:var(--muted)"></span>
        </div>
        <div class="admin-stats-row" id="adminStats"></div>
        <div class="table-wrap">
          <div class="table-head">
            <p class="table-head-title">Stock reciente</p>
            <button class="btn btn-dark btn-sm" onclick="showSection('add')">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Añadir
            </button>
          </div>
          <div style="overflow-x:auto"><table class="data-table" id="dashboardTable"></table></div>
        </div>
      </div>

      <!-- VEHICLES -->
      <div id="sectionVehicles" style="display:none">
        <div class="admin-header">
          <h1 class="admin-title">Gestión de stock</h1>
          <button class="btn btn-dark btn-sm" onclick="showSection('add')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Añadir vehículo
          </button>
        </div>
        <div class="table-wrap">
          <div class="table-head">
            <p class="table-head-title">Todos los vehículos</p>
            <input type="text" class="filter-search" id="adminSearch" placeholder="Buscar..." style="max-width:220px;height:36px">
          </div>
          <div style="overflow-x:auto"><table class="data-table" id="vehiclesTable"></table></div>
        </div>
      </div>

      <!-- ADD / EDIT -->
      <div id="sectionAdd" style="display:none">
        <div class="admin-header">
          <h1 class="admin-title" id="formTitle">Añadir vehículo</h1>
        </div>
        <div style="background:var(--white);border-radius:var(--r-lg);padding:40px;box-shadow:var(--shadow-sm)">
          <form id="vehicleForm" onsubmit="handleVehicleSubmit(event)">
            <input type="hidden" id="editId">
            <div class="form-grid-2" style="margin-bottom:14px">
              <div class="form-group">
                <label class="form-label">Marca *</label>
                <input type="text" class="form-input" id="fBrand" placeholder="Volkswagen" required>
              </div>
              <div class="form-group">
                <label class="form-label">Modelo *</label>
                <input type="text" class="form-input" id="fModel" placeholder="Golf 1.6 TDI" required>
              </div>
              <div class="form-group">
                <label class="form-label">Año *</label>
                <input type="number" class="form-input" id="fYear" placeholder="2020" min="1990" max="2030" required>
              </div>
              <div class="form-group">
                <label class="form-label">Kilómetros *</label>
                <input type="number" class="form-input" id="fKm" placeholder="50000" min="0" required>
              </div>
              <div class="form-group">
                <label class="form-label">Combustible *</label>
                <select class="form-input" id="fFuel" required style="appearance:none">
                  <option value="">Seleccionar</option>
                  <option>Gasolina</option><option>Diesel</option>
                  <option>Híbrido</option><option>Eléctrico</option><option>Gas (GLP)</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Cambio *</label>
                <select class="form-input" id="fTransmission" required style="appearance:none">
                  <option value="">Seleccionar</option>
                  <option>Manual</option><option>Automático</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Motor</label>
                <input type="text" class="form-input" id="fEngine" placeholder="1.6 TDI 115cv">
              </div>
              <div class="form-group">
                <label class="form-label">Puertas</label>
                <select class="form-input" id="fDoors" style="appearance:none">
                  <option value="2">2</option><option value="3">3</option>
                  <option value="4">4</option><option value="5" selected>5</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Tracción</label>
                <select class="form-input" id="fTraction" style="appearance:none">
                  <option>Tracción delantera</option>
                  <option>Tracción trasera</option>
                  <option>Tracción total (4x4)</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Tipo</label>
                <select class="form-input" id="fCondition" style="appearance:none">
                  <option>Turismo</option><option>SUV</option><option>Furgoneta</option>
                  <option>Monovolumen</option><option>Coupé</option><option>Descapotable</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Precio (€) *</label>
                <input type="number" class="form-input" id="fPrice" placeholder="15000" min="0" required>
              </div>
              <div class="form-group">
                <label class="form-label">IVA</label>
                <select class="form-input" id="fIva" style="appearance:none">
                  <option value="Incluido">IVA Incluido</option>
                  <option value="No incluido">IVA No incluido</option>
                </select>
              </div>
            </div>
            <div class="form-group" style="margin-bottom:14px">
              <label class="form-label">Imagen del vehículo</label>
              <input type="hidden" id="fImage">
              <div id="imageUploadArea" onclick="document.getElementById('fImageFile').click()"
                style="border:2px dashed var(--border);border-radius:var(--r-md);padding:20px;text-align:center;cursor:pointer;transition:border-color .2s;position:relative;overflow:hidden;min-height:110px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px">
                <img id="imagePreview" src="" alt="" style="display:none;max-height:140px;max-width:100%;border-radius:var(--r-sm);object-fit:cover">
                <div id="imageUploadPlaceholder" style="display:flex;flex-direction:column;align-items:center">
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 6px"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                  <p style="font-size:13px;color:var(--muted);margin:0">Haz clic para subir una foto</p>
                  <p style="font-size:11px;color:var(--muted);opacity:.6;margin:2px 0 0">JPG, PNG, WEBP — máx. 5 MB</p>
                </div>
                <button type="button" id="imageRemoveBtn" onclick="event.stopPropagation();removeImage()"
                  style="display:none;position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.55);border:none;color:white;border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:14px;line-height:1;padding:0">✕</button>
              </div>
              <input type="file" id="fImageFile" accept="image/*" style="display:none" onchange="handleImageUpload(this)">
            </div>
            <div class="form-group" style="margin-bottom:28px">
              <label class="form-label">Texto destacado</label>
              <input type="text" class="form-input" id="fHighlight" value="REVISADO Y CON 1 AÑO DE GARANTIA (TALLER PROPIO)">
            </div>
            <div style="display:flex;gap:10px">
              <button type="submit" class="btn btn-dark">Guardar vehículo</button>
              <button type="button" class="btn btn-ghost" onclick="showSection('vehicles')">Cancelar</button>
            </div>
          </form>
        </div>
      </div>

    </main>
  </div>
</div>

<script src="../js/vehicles-data.js"></script>
<script>
  window.addEventListener('DOMContentLoaded', () => {
    if (isLoggedIn()) showAdmin();
    document.getElementById('adminDate').textContent = new Date().toLocaleDateString('es-ES', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  });

  function handleLogin(e) {
    e.preventDefault();
    if (login(document.getElementById('passwordInput').value)) {
      showAdmin();
    } else {
      document.getElementById('loginError').classList.add('show');
      document.getElementById('passwordInput').value = '';
      document.getElementById('passwordInput').focus();
    }
  }

  function handleLogout() {
    logout();
    document.getElementById('adminPanel').style.display = 'none';
    document.getElementById('loginPage').style.display = 'flex';
  }

  function showAdmin() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    renderDashboard();
  }

  function showSection(name) {
    ['dashboard','vehicles','add'].forEach(s => {
      document.getElementById('section' + s.charAt(0).toUpperCase() + s.slice(1)).style.display = 'none';
    });
    document.getElementById('section' + name.charAt(0).toUpperCase() + name.slice(1)).style.display = 'block';
    document.querySelectorAll('.admin-nav a[id]').forEach(a => a.classList.remove('active'));
    const map = { dashboard:'navDashboard', vehicles:'navVehicles', add:'navAdd' };
    if (map[name]) document.getElementById(map[name]).classList.add('active');
    if (name === 'dashboard') renderDashboard();
    if (name === 'vehicles')  renderVehiclesTable();
    if (name === 'add') {
      document.getElementById('vehicleForm').reset();
      document.getElementById('editId').value = '';
      document.getElementById('fHighlight').value = 'REVISADO Y CON 1 AÑO DE GARANTIA (TALLER PROPIO)';
      document.getElementById('formTitle').textContent = 'Añadir vehículo';
      removeImage();
    }
  }

  function renderDashboard() {
    const vehicles = getVehicles();
    const total = vehicles.length, available = vehicles.filter(v=>!v.sold).length, sold = vehicles.filter(v=>v.sold).length;
    const value = vehicles.filter(v=>!v.sold).reduce((s,v)=>s+v.price,0);
    document.getElementById('adminStats').innerHTML = `
      <div class="admin-stat"><p class="admin-stat-num">${total}</p><p class="admin-stat-label">Total</p></div>
      <div class="admin-stat"><p class="admin-stat-num" style="color:#2D7A47">${available}</p><p class="admin-stat-label">Disponibles</p></div>
      <div class="admin-stat"><p class="admin-stat-num" style="color:#B83232">${sold}</p><p class="admin-stat-label">Vendidos</p></div>
      <div class="admin-stat"><p class="admin-stat-num" style="font-size:22px">${formatPrice(value)}</p><p class="admin-stat-label">Valor en stock</p></div>`;
    renderTable(document.getElementById('dashboardTable'), vehicles.slice(0,10));
  }

  function renderVehiclesTable(filter='') {
    let vehicles = getVehicles();
    if (filter) vehicles = vehicles.filter(v => `${v.brand} ${v.model}`.toLowerCase().includes(filter.toLowerCase()));
    renderTable(document.getElementById('vehiclesTable'), vehicles);
    document.getElementById('adminSearch').oninput = e => renderVehiclesTable(e.target.value);
  }

  function renderTable(el, vehicles) {
    el.innerHTML = `
      <thead><tr>
        <th>Vehículo</th><th>Año</th><th>Km</th><th>Combustible</th><th>Precio</th><th>Estado</th><th>Acciones</th>
      </tr></thead>
      <tbody>${vehicles.map(v => `
        <tr>
          <td><strong>${v.brand}</strong> ${v.model}</td>
          <td>${v.year}</td>
          <td>${formatKm(v.km)}</td>
          <td>${v.fuel}</td>
          <td><strong>${formatPrice(v.price)}</strong></td>
          <td><span class="pill ${v.sold ? 'pill-off' : 'pill-on'}">${v.sold ? 'Vendido' : 'Disponible'}</span></td>
          <td><div class="act-btns">
            <button class="act-btn act-edit" onclick="editVehicle(${v.id})" title="Editar">
              <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="act-btn act-toggle" onclick="toggleSold(${v.id})" title="${v.sold ? 'Disponible' : 'Vendido'}">
              <svg viewBox="0 0 24 24"><path d="${v.sold ? 'M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z' : 'M20 6L9 17l-5-5'}"/></svg>
            </button>
            <button class="act-btn act-del" onclick="deleteVehicle(${v.id})" title="Eliminar">
              <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
            </button>
          </div></td>
        </tr>`).join('')}
      </tbody>`;
  }

  function toggleSold(id) {
    const vehicles = getVehicles();
    const v = vehicles.find(v=>v.id===id);
    if (v) { v.sold = !v.sold; saveVehicles(vehicles); }
    const activeSection = document.getElementById('sectionVehicles').style.display !== 'none' ? 'vehicles' : 'dashboard';
    if (activeSection === 'vehicles') renderVehiclesTable(); else renderDashboard();
  }

  function deleteVehicle(id) {
    if (!confirm('¿Eliminar este vehículo?')) return;
    saveVehicles(getVehicles().filter(v=>v.id!==id));
    const activeSection = document.getElementById('sectionVehicles').style.display !== 'none' ? 'vehicles' : 'dashboard';
    if (activeSection === 'vehicles') renderVehiclesTable(); else renderDashboard();
  }

  function editVehicle(id) {
    const v = getVehicles().find(v=>v.id===id);
    if (!v) return;
    showSection('add');
    document.getElementById('formTitle').textContent = 'Editar vehículo';
    document.getElementById('editId').value = v.id;
    document.getElementById('fBrand').value = v.brand;
    document.getElementById('fModel').value = v.model;
    document.getElementById('fYear').value = v.year;
    document.getElementById('fKm').value = v.km;
    document.getElementById('fFuel').value = v.fuel;
    document.getElementById('fTransmission').value = v.transmission;
    document.getElementById('fEngine').value = v.engine;
    document.getElementById('fDoors').value = v.doors;
    document.getElementById('fTraction').value = v.traction;
    document.getElementById('fCondition').value = v.condition;
    document.getElementById('fPrice').value = v.price;
    document.getElementById('fIva').value = v.iva;
    setImagePreview(v.image || '');
    document.getElementById('fHighlight').value = v.highlight || '';
  }

  function handleVehicleSubmit(e) {
    e.preventDefault();
    const editId = document.getElementById('editId').value;
    const data = {
      brand: document.getElementById('fBrand').value,
      model: document.getElementById('fModel').value,
      year: parseInt(document.getElementById('fYear').value),
      km: parseInt(document.getElementById('fKm').value),
      fuel: document.getElementById('fFuel').value,
      transmission: document.getElementById('fTransmission').value,
      engine: document.getElementById('fEngine').value,
      doors: parseInt(document.getElementById('fDoors').value),
      traction: document.getElementById('fTraction').value,
      condition: document.getElementById('fCondition').value,
      price: parseInt(document.getElementById('fPrice').value),
      iva: document.getElementById('fIva').value,
      image: document.getElementById('fImage').value,
      highlight: document.getElementById('fHighlight').value,
    };
    const vehicles = getVehicles();
    if (editId) {
      const idx = vehicles.findIndex(v=>v.id===parseInt(editId));
      if (idx >= 0) vehicles[idx] = { ...vehicles[idx], ...data };
    } else {
      data.id = getNextId();
      data.sold = false;
      vehicles.push(data);
    }
    saveVehicles(vehicles);
    showSection('vehicles');
  }

  function handleImageUpload(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { alert('La imagen no puede superar 5 MB.'); input.value = ''; return; }
    const reader = new FileReader();
    reader.onload = e => setImagePreview(e.target.result);
    reader.readAsDataURL(file);
  }

  function setImagePreview(src) {
    document.getElementById('fImage').value = src;
    const preview = document.getElementById('imagePreview');
    const placeholder = document.getElementById('imageUploadPlaceholder');
    const removeBtn = document.getElementById('imageRemoveBtn');
    if (src) {
      preview.src = src;
      preview.style.display = 'block';
      placeholder.style.display = 'none';
      removeBtn.style.display = 'block';
      document.getElementById('imageUploadArea').style.border = '2px solid var(--brand)';
    } else {
      removeImage();
    }
  }

  function removeImage() {
    document.getElementById('fImage').value = '';
    document.getElementById('fImageFile').value = '';
    document.getElementById('imagePreview').src = '';
    document.getElementById('imagePreview').style.display = 'none';
    document.getElementById('imageUploadPlaceholder').style.display = 'flex';
    document.getElementById('imageRemoveBtn').style.display = 'none';
    document.getElementById('imageUploadArea').style.border = '2px dashed var(--border)';
  }
</script>
</body>
</html>
